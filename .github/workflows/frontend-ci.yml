# CI for the React + TypeScript frontend.
# Type-checks and builds the app on every push / PR that touches the frontend.
# A green build here is what Vercel/Netlify will also run on deploy.

name: Frontend CI

on:
  push:
    branches: [main]
    paths: ["frontend/**", ".github/workflows/frontend-ci.yml"]
  pull_request:
    paths: ["frontend/**", ".github/workflows/frontend-ci.yml"]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        # `npm install` works whether or not a package-lock.json is committed.
        run: npm install

      - name: Type-check
        run: npm run lint

      - name: Build
        run: npm run build
